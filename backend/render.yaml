services:
  - type: web
    name: ai-threat-reporter-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DAILY_CREDIT_LIMIT
        value: "20"
      - key: MAX_INPUT_LENGTH
        value: "5000"
      - key: MAX_FILE_LINES
        value: "200"